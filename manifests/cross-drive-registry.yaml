# Legacy AI — Cross-Drive Registry
# What's on which drive. Agents use this to locate resources.
# This file is READ-ONLY for agents.

drives:
  sandisk_1tb:
    mount: /Volumes/SanDisk1Tb
    role: active_development
    governance: true
    supercache: /Volumes/SanDisk1Tb/.supercache
    contents:
      - active project directories
      - SSOT/ (drive-level)
      - .supercache/ (canonical copy)
      - gcp_infrastructure_builder.py

  storage:
    mount: /Volumes/Storage
    role: secondary_projects_and_tools
    governance: true
    supercache: symlink → /Volumes/SanDisk1Tb/.supercache
    contents:
      - FLOYD_CLI/ (Floyd ecosystem source code)
      - MCP/ (MCP server installations)
      - PEBKAC/ (agent defense stack)
      - LAIAS/ (Legacy AI Agent Studio)
      - skillsdump/ (349+ agent skills)
      - secondary project directories

  t7:
    mount: /Volumes/T7
    role: time_machine_target_mac_mini
    governance_access: off_limits
    reason: "Time Machine target for Mac mini backups. macOS Time Machine manages the drive automatically. Agent activity risks interfering with backup integrity."
    contents:
      - Time Machine backups (rolling ~11 days, auto-thinned by macOS)
    rules:
      - no_reads
      - no_writes
      - no_scans
      - no_references
    confirmed_via: Finder inspection 2026-04-15 (13 backup directories + backup_manifest.plist, zero ML/dataset content)

  google_drive:
    mount: "~/Library/CloudStorage/GoogleDrive-douglastalley1977@gmail.com/My Drive"
    role: tier_3_cloud_backbone
    active: true
    sync_targets:
      - /Volumes/Storage
      - /Volumes/SanDisk1Tb
    structure:
      - Floyd_Ecosystem/supercache.retired-20260415/ (pre-migration archive — DO NOT EDIT)
      - Floyd_Ecosystem/archives/
      - Floyd_Ecosystem/data_lake/
      - Floyd_Ecosystem/assets/
      - Floyd_Ecosystem/state_backups/
      - Floyd_Ecosystem/log_archives/
      - "Other computers/My Mac/ (Google Drive for Desktop backup feature — cloud-only, not mirrored locally)"

github:
  org: LegacyAI-FloydsLabs
  repo: supercache
  role: version_control_for_supercache
  url: "https://github.com/LegacyAI-FloydsLabs/supercache"


# =============================================================================
# ## Mandatory execution contract
# For EACH requested item:
# 1) Show exact action taken
# 2) Show direct evidence (file/line/command/output)
# 3) Show verification result
# 4) Mark status only after proof
#
# ## Forbidden behaviors
# - Declaring "done" without evidence
# - Collapsing multiple requested items into one vague summary
# - Skipping failed steps without explicit blocker report
#
# ## Required output structure
# A) Requested items checklist
# B) Per-item evidence ledger
# C) Verification receipts
# D) Completeness matrix (item -> done/blocked -> evidence)
#
# ## Hard gate
# If any requested item has no evidence row, final status MUST be INCOMPLETE.


